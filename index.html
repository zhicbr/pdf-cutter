<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线PDF切割工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-lg">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">在线PDF切割工具</h1>

        <div class="mb-6">
            <label for="file-upload" class="cursor-pointer bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg inline-block w-full text-center transition duration-300">
                <span id="file-name">选择PDF文件</span>
            </label>
            <input id="file-upload" type="file" class="hidden" accept=".pdf">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label for="start-page" class="block text-gray-700 font-semibold mb-2">起始页</label>
                <input type="number" id="start-page" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 5">
            </div>
            <div>
                <label for="end-page" class="block text-gray-700 font-semibold mb-2">结束页</label>
                <input type="number" id="end-page" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 10">
            </div>
        </div>

        <button id="split-button" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg transition duration-300 disabled:bg-gray-400" disabled>
            开始切割
        </button>

        <div id="status" class="mt-4 text-center text-gray-600"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
